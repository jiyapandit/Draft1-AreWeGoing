version: "3.9"
services:
  db:
    image: postgres:15
    container_name: arewegoing_db
    environment:
      POSTGRES_DB: arewegoing
      POSTGRES_USER: arewegoing
      POSTGRES_PASSWORD: arewegoing
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
